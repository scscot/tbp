name: PreIntake Email Campaign - Gmail

on:
  schedule:
    # 4 sends/day between 7:30am-11:30am PT (UTC-8). During PDT (Mar-Nov) sends
    # shift 1 hour earlier (6:30am, 8:00am, 9:00am, 10:30am) — still morning.
    #
    #   PST: 7:30am, 9:00am, 10:00am, 11:30am PT
    #   PDT: 6:30am, 8:00am,  9:00am, 10:30am PT
    #
    # Day-of-week: 1-5 = Mon-Fri
    - cron: '30 15 * * 1-5'
    - cron: '0 17 * * 1-5'
    - cron: '0 18 * * 1-5'
    - cron: '30 19 * * 1-5'

  # Allow manual trigger for testing
  workflow_dispatch:

env:
  NODE_VERSION: '20'

jobs:
  send-campaign:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      # Use law.preintake.ai API key
      MAILGUN_API_KEY: ${{ secrets.PREINTAKE_LAW_MAILGUN_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies
        run: |
          cd scripts && npm install firebase-admin axios form-data && cd ..
          cd functions && npm install && cd ..
          echo "Dependencies installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Send email batch (Gmail only)
        env:
          # Batch size is read from Firestore config/emailCampaign.preintakeGmailBatchSize
          MAILGUN_DOMAIN: law.preintake.ai
        run: |
          echo "Starting PreIntake email campaign (Gmail only via law.preintake.ai)..."
          echo "Batch size: read from Firestore config/emailCampaign.preintakeGmailBatchSize"
          echo "Mailgun domain: $MAILGUN_DOMAIN"
          node scripts/send-preintake-campaign-gmail.js

      - name: Notify on failure
        if: failure()
        run: |
          curl -s --user "api:$MAILGUN_API_KEY" \
            "https://api.mailgun.net/v3/law.preintake.ai/messages" \
            -F from="Stephen Scott <stephen@law.preintake.ai>" \
            -F to="scscot@gmail.com" \
            -F subject="GitHub Actions: PreIntake Gmail Campaign FAILED" \
            -F text="Workflow failed: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            && echo "Failure notification sent" || echo "Failed to send notification"

      - name: Clean up
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
