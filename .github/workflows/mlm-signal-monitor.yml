name: MLM Signal Monitor

on:
  schedule:
    # Run every 6 hours: 6am, 12pm, 6pm, 12am PT
    - cron: '0 14,20,2,8 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: 'Signal source (google, reddit, youtube, facebook, twitter, tiktok, instagram, threads, directory, or all)'
        required: false
        default: 'all'
      dry_run:
        description: 'Dry run (preview only)'
        required: false
        type: boolean
        default: false
      no_time_filter:
        description: 'First run - disable time filtering to build initial database'
        required: false
        type: boolean
        default: false

jobs:
  monitor-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install firebase-admin axios

      - name: Create secrets directory and files
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > secrets/serviceAccountKey.json
          echo '${{ secrets.SERPAPI_KEY }}' > secrets/SerpAPI-Key

      - name: Run Signal Monitor
        run: |
          SOURCE_ARG=""
          if [ "${{ github.event.inputs.source }}" != "" ] && [ "${{ github.event.inputs.source }}" != "all" ]; then
            SOURCE_ARG="--source=${{ github.event.inputs.source }}"
          fi

          DRY_RUN_ARG=""
          if [ "${{ github.event.inputs.dry_run }}" == "true" ]; then
            DRY_RUN_ARG="--dry-run"
          fi

          NO_TIME_FILTER_ARG=""
          if [ "${{ github.event.inputs.no_time_filter }}" == "true" ]; then
            NO_TIME_FILTER_ARG="--no-time-filter"
          fi

          node scripts/mlm-signal-monitor.js --monitor $SOURCE_ARG $DRY_RUN_ARG $NO_TIME_FILTER_ARG
        env:
          GOOGLE_APPLICATION_CREDENTIALS: secrets/serviceAccountKey.json

      - name: Generate Summary
        if: always()
        run: |
          echo "## MLM Signal Monitor Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: ${{ github.event.inputs.source || 'all' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Mode**: ${{ github.event.inputs.dry_run == 'true' && 'DRY RUN' || 'LIVE' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Time Filter**: ${{ github.event.inputs.no_time_filter == 'true' && 'DISABLED (initial build)' || 'ENABLED (past 24h only)' }}" >> $GITHUB_STEP_SUMMARY

  extract-profiles:
    runs-on: ubuntu-latest
    needs: monitor-signals
    if: github.event.inputs.dry_run != 'true'
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install firebase-admin playwright
          npx playwright install chromium

      - name: Create secrets directory and service account file
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > secrets/serviceAccountKey.json

      - name: Run Profile Extractor
        run: |
          node scripts/mlm-profile-extractor.js --extract --max=100
        env:
          GOOGLE_APPLICATION_CREDENTIALS: secrets/serviceAccountKey.json

      - name: Generate Summary
        if: always()
        run: |
          echo "## MLM Profile Extractor Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Max profiles**: 100" >> $GITHUB_STEP_SUMMARY

  enrich-emails:
    runs-on: ubuntu-latest
    needs: extract-profiles
    if: github.event.inputs.dry_run != 'true'
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd scripts
          npm install firebase-admin axios

      - name: Create secrets directory and files
        run: |
          mkdir -p secrets
          echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT }}' > secrets/serviceAccountKey.json
          echo '${{ secrets.SERPAPI_KEY }}' > secrets/SerpAPI-Key

      - name: Run Email Enrichment
        run: |
          node scripts/mlm-email-enrichment.js --enrich --max=50
        env:
          GOOGLE_APPLICATION_CREDENTIALS: secrets/serviceAccountKey.json

      - name: Generate Summary
        if: always()
        run: |
          echo "## MLM Email Enrichment Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Time**: $(date -u)" >> $GITHUB_STEP_SUMMARY
          echo "- **Max searches**: 50" >> $GITHUB_STEP_SUMMARY
          echo "- **Purpose**: Find emails for contacts with name+company via SerpAPI" >> $GITHUB_STEP_SUMMARY
