name: Cleanup PreIntake Static Demos

on:
  schedule:
    # Run once on March 1, 2026 at 6am PT (14:00 UTC)
    - cron: '0 14 1 3 *'
  workflow_dispatch:
    # Allow manual trigger for testing

jobs:
  cleanup:
    runs-on: ubuntu-latest

    steps:
      - name: Check if 2026
        id: check-year
        run: |
          CURRENT_YEAR=$(date +%Y)
          if [ "$CURRENT_YEAR" != "2026" ] && [ "${{ github.event_name }}" == "schedule" ]; then
            echo "Not 2026, skipping cleanup"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check-year.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        if: steps.check-year.outputs.skip != 'true'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        if: steps.check-year.outputs.skip != 'true'
        uses: google-github-actions/setup-gcloud@v2

      - name: Count files before deletion
        if: steps.check-year.outputs.skip != 'true'
        run: |
          echo "Counting static demo folders..."
          COUNT=$(gsutil ls gs://teambuilder-plus-fe74d.firebasestorage.app/preintake-demos/ 2>/dev/null | wc -l || echo "0")
          echo "Found $COUNT demo folders to delete"

      - name: Delete static demo files from Storage
        if: steps.check-year.outputs.skip != 'true'
        run: |
          echo "Deleting all static demo files from Storage..."
          gsutil -m rm -r gs://teambuilder-plus-fe74d.firebasestorage.app/preintake-demos/ || true
          echo "Storage cleanup complete"

      - name: Verify Storage deletion
        if: steps.check-year.outputs.skip != 'true'
        run: |
          if gsutil ls gs://teambuilder-plus-fe74d.firebasestorage.app/preintake-demos/ 2>/dev/null | head -1; then
            echo "Warning: Some files may still exist"
          else
            echo "All static demo files deleted successfully"
          fi

      - name: Delete regeneration scripts
        if: steps.check-year.outputs.skip != 'true'
        run: |
          echo "Deleting regeneration scripts..."
          rm -f scripts/force-regen-demo.js
          rm -f scripts/regenerate-bar-profile-demos.js
          rm -f scripts/regenerate-demo.js
          rm -f scripts/regenerate-preintake-demos.js
          rm -f scripts/update-demo-postmessage.js
          echo "Regeneration scripts deleted"

      - name: Commit and push script deletions
        if: steps.check-year.outputs.skip != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Cleanup: Delete PreIntake regeneration scripts (dynamic architecture complete)

            Deleted files:
            - scripts/force-regen-demo.js
            - scripts/regenerate-bar-profile-demos.js
            - scripts/regenerate-demo.js
            - scripts/regenerate-preintake-demos.js
            - scripts/update-demo-postmessage.js

            These scripts are no longer needed after migrating to dynamic demo architecture.

            🤖 Generated with [Claude Code](https://claude.com/claude-code)"
            git push
          fi

      - name: Summary
        if: steps.check-year.outputs.skip != 'true'
        run: |
          echo "=== Cleanup Complete ==="
          echo "✓ Deleted ~3,400 static demo folders from Storage"
          echo "✓ Deleted 5 regeneration scripts from repository"
          echo "Dynamic demo architecture cleanup finished"
