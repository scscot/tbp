name: FuXion Contact Scraper

# PERMANENTLY DISABLED (Mar 11, 2026)
#
# FuXion scraping is not viable due to:
# 1. Website bot detection blocks Puppeteer/Playwright (shows "Oops!" error page)
# 2. Distributor IDs are usernames (e.g., "bienxtar", "viviarevalo"), not real names
# 3. SerpAPI Google search yields only ~10% with mostly generic emails
# 4. 752 URLs discovered but effectively unscrapeble
#
# Tested: Puppeteer, Puppeteer+Stealth, Playwright Chromium, Playwright Firefox,
#         headed/headless modes, session warming, user flow simulation - all blocked.
# SerpAPI test: 10 searches = 1 contact (generic fuxionmexico@outlook.com)
#
# Focus efforts on Omnilife (working) and other Spanish companies instead.

on:
  # Permanently disabled - do not re-enable
  # schedule:
  #   - cron: '0 16,22,4,10 * * *'

  # Manual trigger disabled to prevent accidental credit usage
  # workflow_dispatch:
    inputs:
      max_urls:
        description: 'Maximum URLs to scrape per run'
        required: false
        default: '100'
        type: string
      dry_run:
        description: 'Dry run (preview only, no Firestore writes)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies
        run: |
          cd scripts && npm ci && cd ..
          echo "Dependencies installed"

      - name: Install Playwright browsers
        run: |
          cd scripts && npx playwright install firefox --with-deps
          echo "Playwright Firefox installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Show pre-run stats
        run: |
          echo "Pre-run stats:"
          node scripts/fuxion-scraper.js --stats || true

      - name: Run FuXion Scraper
        env:
          MAX_URLS: ${{ github.event.inputs.max_urls || '100' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "Starting FuXion Contact Scraper (Playwright Firefox)..."
          echo "Max URLs per run: $MAX_URLS"
          echo ""
          echo "NOTE: FuXion has bot detection - this may fail."
          echo ""

          ARGS="--scrape --max=$MAX_URLS"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Mode: DRY RUN"
            ARGS="$ARGS --dry-run"
          else
            echo "Mode: LIVE"
          fi

          node scripts/fuxion-scraper.js $ARGS

      - name: Show final stats
        if: always()
        run: |
          echo "Final stats:"
          node scripts/fuxion-scraper.js --stats || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
