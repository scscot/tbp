name: Domain Warming - Update TBP Batch Sizes

on:
  schedule:
    # Run daily at 6am PT (2pm UTC during PST, 1pm UTC during PDT)
    # Daily recalculation keeps batch sizes aligned with current queue sizes
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      force_week:
        description: 'Force specific week number (optional)'
        required: false
        type: number
      dry_run:
        description: 'Dry run - show calculations without updating Firestore'
        required: false
        type: boolean
        default: false

jobs:
  update-batch-sizes:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate current warming week
        id: week
        run: |
          CONFIG=$(cat .github/warming-config.json)

          # Use TBP start date for week calculation
          START_DATE=$(echo $CONFIG | jq -r '.tbp.startDate')

          # Calculate weeks since start
          START_EPOCH=$(date -d "$START_DATE" +%s)
          NOW_EPOCH=$(date +%s)
          DAYS_ELAPSED=$(( (NOW_EPOCH - START_EPOCH) / 86400 ))

          # Handle negative days (before start date)
          if [ $DAYS_ELAPSED -lt 0 ]; then
            WEEK_NUM=1
          else
            WEEK_NUM=$(( (DAYS_ELAPSED / 7) + 1 ))
          fi

          # Override if force_week provided
          if [ -n "${{ inputs.force_week }}" ]; then
            WEEK_NUM=${{ inputs.force_week }}
          fi

          echo "week=$WEEK_NUM" >> $GITHUB_OUTPUT
          echo "Current warming week: $WEEK_NUM"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install firebase-admin

      - name: Calculate dynamic batch sizes and update Firestore
        id: update
        run: |
          node << 'EOF'
          const admin = require('firebase-admin');
          const fs = require('fs');

          // Initialize with service account from secret
          const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
          admin.initializeApp({
            credential: admin.credential.cert(serviceAccount)
          });

          const db = admin.firestore();
          const week = parseInt(process.env.WEEK);
          const dryRun = process.env.DRY_RUN === 'true';

          // Load config
          const config = JSON.parse(fs.readFileSync('.github/warming-config.json', 'utf8'));
          const tbpConfig = config.tbp;
          const preintakeConfig = config.preintake;

          // Get warming multiplier for current week
          const warmingSchedule = tbpConfig.warmingSchedule;
          const warmingMultiplier = week <= warmingSchedule.length
            ? warmingSchedule[week - 1]
            : warmingSchedule[warmingSchedule.length - 1];

          const targetDays = tbpConfig.targetCompletionDays;
          const runsPerDay = tbpConfig.runsPerDay;
          const minBatch = tbpConfig.minBatchSize;
          const maxBatch = tbpConfig.maxBatchSize;

          console.log('='.repeat(60));
          console.log('DOMAIN WARMING - DYNAMIC BATCH SIZE CALCULATION');
          console.log('='.repeat(60));
          console.log(`Week: ${week}`);
          console.log(`Warming Multiplier: ${(warmingMultiplier * 100).toFixed(0)}%`);
          console.log(`Target Completion: ${targetDays} days`);
          console.log(`Runs Per Day: ${runsPerDay}`);
          console.log(`Batch Size Range: ${minBatch} - ${maxBatch}`);
          console.log(`Mode: ${dryRun ? 'DRY RUN' : 'LIVE'}`);
          console.log('');

          async function getUnsentCount(collectionPath) {
            try {
              // Handle subcollection paths like "emailCampaigns/master/contacts"
              let collectionRef;
              if (collectionPath.includes('/')) {
                const parts = collectionPath.split('/');
                collectionRef = db.collection(parts[0]).doc(parts[1]).collection(parts[2]);
              } else {
                collectionRef = db.collection(collectionPath);
              }

              const snapshot = await collectionRef
                .where('sent', '==', false)
                .count()
                .get();
              return snapshot.data().count;
            } catch (error) {
              console.error(`  Error counting ${collectionPath}: ${error.message}`);
              return 0;
            }
          }

          function calculateBatchSize(unsentCount, warmingMultiplier) {
            if (unsentCount === 0) return 0;

            // Base batch size to complete in targetDays
            const baseBatch = Math.ceil(unsentCount / (targetDays * runsPerDay));

            // Apply warming multiplier
            const warmedBatch = Math.ceil(baseBatch * warmingMultiplier);

            // Clamp to min/max
            return Math.max(minBatch, Math.min(warmedBatch, maxBatch));
          }

          async function main() {
            const campaigns = tbpConfig.campaigns;
            const results = {};
            const firestoreUpdates = {};
            let totalDaily = 0;

            console.log('CAMPAIGN BATCH SIZES:');
            console.log('-'.repeat(60));
            console.log(`${'Campaign'.padEnd(12)} | ${'Unsent'.padStart(8)} | ${'Base'.padStart(6)} | ${'Final'.padStart(6)} | ${'Daily'.padStart(6)} | Status`);
            console.log('-'.repeat(60));

            for (const [name, campaignConfig] of Object.entries(campaigns)) {
              const { collection, firestoreField, enabled } = campaignConfig;

              if (!enabled) {
                console.log(`${name.padEnd(12)} | ${'N/A'.padStart(8)} | ${'N/A'.padStart(6)} | ${'0'.padStart(6)} | ${'0'.padStart(6)} | Disabled`);
                firestoreUpdates[firestoreField] = 0;
                results[name] = { unsent: 0, base: 0, final: 0, daily: 0, status: 'disabled' };
                continue;
              }

              const unsentCount = await getUnsentCount(collection);
              const baseBatch = unsentCount > 0 ? Math.ceil(unsentCount / (targetDays * runsPerDay)) : 0;
              const finalBatch = calculateBatchSize(unsentCount, warmingMultiplier);
              const dailyEmails = finalBatch * runsPerDay;

              const status = unsentCount === 0 ? 'Empty' : 'Active';
              console.log(`${name.padEnd(12)} | ${unsentCount.toString().padStart(8)} | ${baseBatch.toString().padStart(6)} | ${finalBatch.toString().padStart(6)} | ${dailyEmails.toString().padStart(6)} | ${status}`);

              firestoreUpdates[firestoreField] = finalBatch;
              results[name] = { unsent: unsentCount, base: baseBatch, final: finalBatch, daily: dailyEmails, status };
              totalDaily += dailyEmails;
            }

            console.log('-'.repeat(60));
            console.log(`${'TOTAL'.padEnd(12)} | ${''.padStart(8)} | ${''.padStart(6)} | ${''.padStart(6)} | ${totalDaily.toString().padStart(6)} |`);
            console.log('');

            // Handle PreIntake (static schedule)
            const preintakeSchedule = preintakeConfig.schedule;
            const preintakeWeekConfig = preintakeSchedule.find(w => w.week === week)
              || preintakeSchedule[preintakeSchedule.length - 1];
            const preintakeBatch = preintakeWeekConfig.batchSize;

            console.log('PREINTAKE (Static Schedule):');
            console.log(`  Week ${week} batch size: ${preintakeBatch}`);
            console.log('');

            // Update Firestore
            if (!dryRun) {
              const configRef = db.collection('config').doc('emailCampaign');

              await configRef.set({
                ...firestoreUpdates,
                preintakeBatchSize: preintakeBatch,
                warmingWeek: week,
                warmingMultiplier: warmingMultiplier,
                calculatedAt: admin.firestore.FieldValue.serverTimestamp(),
                updatedBy: 'github-actions-dynamic'
              }, { merge: true });

              console.log('✅ Firestore config/emailCampaign updated successfully');
            } else {
              console.log('🔍 DRY RUN - Firestore NOT updated');
              console.log('Would update:', JSON.stringify(firestoreUpdates, null, 2));
            }

            // Output for GitHub summary
            const summaryData = {
              week,
              warmingMultiplier,
              campaigns: results,
              totalDaily,
              preintakeBatch
            };

            // Write to file for summary step
            fs.writeFileSync('/tmp/batch-results.json', JSON.stringify(summaryData, null, 2));
          }

          main()
            .then(() => process.exit(0))
            .catch(err => {
              console.error('Error:', err);
              process.exit(1);
            });
          EOF
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          WEEK: ${{ steps.week.outputs.week }}
          DRY_RUN: ${{ inputs.dry_run }}

      - name: Generate Summary
        if: always()
        run: |
          if [ -f /tmp/batch-results.json ]; then
            RESULTS=$(cat /tmp/batch-results.json)
            WEEK=$(echo $RESULTS | jq -r '.week')
            MULTIPLIER=$(echo $RESULTS | jq -r '.warmingMultiplier * 100 | floor')
            TOTAL=$(echo $RESULTS | jq -r '.totalDaily')
            PREINTAKE=$(echo $RESULTS | jq -r '.preintakeBatch')

            echo "## Domain Warming Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "- **Warming Week**: $WEEK" >> $GITHUB_STEP_SUMMARY
            echo "- **Warming Multiplier**: ${MULTIPLIER}%" >> $GITHUB_STEP_SUMMARY
            echo "- **Mode**: ${{ inputs.dry_run == 'true' && 'DRY RUN' || 'LIVE' }}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            echo "### TBP Campaigns (Total Daily: $TOTAL emails)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Campaign | Unsent | Base | Final | Daily | Status |" >> $GITHUB_STEP_SUMMARY
            echo "|----------|--------|------|-------|-------|--------|" >> $GITHUB_STEP_SUMMARY

            for campaign in main purchased bfh zinzino fsr paparazzi pruvit scentsy mpg farmasius three spanish; do
              UNSENT=$(echo $RESULTS | jq -r ".campaigns.${campaign}.unsent // 0")
              BASE=$(echo $RESULTS | jq -r ".campaigns.${campaign}.base // 0")
              FINAL=$(echo $RESULTS | jq -r ".campaigns.${campaign}.final // 0")
              DAILY=$(echo $RESULTS | jq -r ".campaigns.${campaign}.daily // 0")
              STATUS=$(echo $RESULTS | jq -r ".campaigns.${campaign}.status // \"unknown\"")
              echo "| ${campaign^} | $UNSENT | $BASE | $FINAL | $DAILY | $STATUS |" >> $GITHUB_STEP_SUMMARY
            done

            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### PreIntake (Static Schedule)" >> $GITHUB_STEP_SUMMARY
            echo "- **Batch Size**: $PREINTAKE" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            if [ "${{ inputs.dry_run }}" != "true" ]; then
              echo "✅ Updated Firestore config/emailCampaign document" >> $GITHUB_STEP_SUMMARY
            else
              echo "🔍 Dry run - no changes made to Firestore" >> $GITHUB_STEP_SUMMARY
            fi
          else
            echo "## Domain Warming Summary" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Results file not found - check workflow logs" >> $GITHUB_STEP_SUMMARY
          fi
