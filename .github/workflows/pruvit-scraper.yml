name: Pruvit Contact Scraper

on:
  # DISABLED: Pipeline paused due to low data yield
  # schedule:
  #   # Run every 4 hours: 8am, 12pm, 4pm, 8pm, 12am, 4am PT
  #   - cron: '0 16,20,0,4,8,12 * * *'

  # Manual trigger only
  workflow_dispatch:
    inputs:
      max_contacts:
        description: 'Maximum contacts to scrape per run'
        required: false
        default: '50'
        type: string
      dry_run:
        description: 'Dry run (preview only, no Firestore writes)'
        required: false
        default: false
        type: boolean
      reset_state:
        description: 'Reset scraper state before running'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies
        run: |
          cd scripts && npm ci && cd ..
          echo "Dependencies installed"

      - name: Install Puppeteer Chrome dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libgbm1 \
            libasound2t64 \
            libxshmfence1
          echo "Chrome dependencies installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Reset state (if requested)
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: |
          echo "Resetting scraper state..."
          node scripts/pruvit-scraper.js --reset
          echo "State reset complete"

      - name: Run Pruvit Contact Scraper
        env:
          MAX_CONTACTS: ${{ github.event.inputs.max_contacts || '50' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "Starting Pruvit Contact Scraper..."
          echo "Max contacts per run: $MAX_CONTACTS"

          ARGS="--scrape --max=$MAX_CONTACTS"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Mode: DRY RUN"
            ARGS="$ARGS --dry-run"
          else
            echo "Mode: LIVE"
          fi

          node scripts/pruvit-scraper.js $ARGS

      - name: Show stats
        if: always()
        run: |
          echo "Final stats:"
          node scripts/pruvit-scraper.js --stats || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
