# THREE International Contact Scraper Workflow
#
# Scrapes contact information (name, email, phone) from THREE International
# representative pages using HTTP requests (axios + cheerio).
#
# NO Puppeteer required - contact info is in static HTML.
# Contact data is stored in three_contacts collection for email campaigns.
#
# Schedule: Every 4 hours (6x daily)

name: THREE Contact Scraper

on:
  # DISABLED: Name extraction produces unusable data (subdomain-based names only)
  # schedule:
  #   # Run every 4 hours: 8am, 12pm, 4pm, 8pm, 12am, 4am PT
  #   - cron: '0 16,20,0,4,8,12 * * *'

  workflow_dispatch:
    inputs:
      max_contacts:
        description: 'Maximum contacts to scrape per run'
        required: false
        default: '50'
        type: string
      dry_run:
        description: 'Dry run (preview only, no Firestore writes)'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies
        run: |
          cd scripts && npm ci && cd ..
          echo "Dependencies installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Run THREE Contact Scraper
        env:
          MAX_CONTACTS: ${{ github.event.inputs.max_contacts || '50' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "Starting THREE Contact Scraper..."
          echo "Max contacts per run: $MAX_CONTACTS"

          ARGS="--scrape --max=$MAX_CONTACTS"

          if [ "$DRY_RUN" = "true" ]; then
            echo "Mode: DRY RUN"
            ARGS="$ARGS --dry-run"
          else
            echo "Mode: LIVE"
          fi

          node scripts/three-scraper.js $ARGS

      - name: Show stats
        if: always()
        run: |
          echo "Final stats:"
          node scripts/three-scraper.js --stats || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
