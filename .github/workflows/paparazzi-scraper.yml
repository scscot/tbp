name: Paparazzi Accessories Scraper

on:
  schedule:
    # Run hourly
    - cron: '0 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      check_count:
        description: 'Number of IDs to check per run'
        required: false
        default: '1000'
        type: string
      max_reps:
        description: 'Maximum reps to scrape per run (0 = unlimited)'
        required: false
        default: '0'
        type: string
      dry_run:
        description: 'Dry run (preview only, no Firestore writes)'
        required: false
        default: false
        type: boolean
      random:
        description: 'Use random sampling instead of sequential scan'
        required: false
        default: false
        type: boolean
      reset_discovery:
        description: 'Reset discovery position to start'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies
        run: |
          cd scripts && npm ci && cd ..
          echo "Dependencies installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Reset discovery position (if requested)
        if: ${{ github.event.inputs.reset_discovery == 'true' }}
        run: |
          echo "Resetting discovery position..."
          node scripts/paparazzi-scraper.js --reset-discovery
          echo "Discovery position reset complete"

      - name: Check if scan is complete
        id: check_complete
        run: |
          # Get current discovery position from stats output
          STATS=$(node scripts/paparazzi-scraper.js --stats 2>&1)
          echo "$STATS"

          # Extract discovery position
          POSITION=$(echo "$STATS" | grep "Discovery position:" | sed 's/.*: //')
          echo "Current discovery position: $POSITION"

          # Extract total IDs checked
          CHECKED=$(echo "$STATS" | grep "Total IDs checked:" | sed 's/.*: //')
          echo "Total IDs checked: $CHECKED"

          # Check if we've completed the full scan (900,000 IDs from 100000-999999)
          if [ "$CHECKED" -ge 900000 ] 2>/dev/null; then
            echo "Scan complete! All 900,000 IDs have been checked."
            echo "scan_complete=true" >> $GITHUB_OUTPUT
          else
            echo "Scan in progress..."
            echo "scan_complete=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Paparazzi scraper
        if: steps.check_complete.outputs.scan_complete != 'true'
        env:
          CHECK_COUNT: ${{ github.event.inputs.check_count || '1000' }}
          MAX_REPS: ${{ github.event.inputs.max_reps || '0' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          RANDOM: ${{ github.event.inputs.random }}
        run: |
          echo "Starting Paparazzi Scraper..."
          echo "IDs to check: $CHECK_COUNT"

          ARGS="--discover --scrape --check=$CHECK_COUNT"

          if [ "$MAX_REPS" != "0" ] && [ -n "$MAX_REPS" ]; then
            echo "Max reps: $MAX_REPS"
            ARGS="$ARGS --max=$MAX_REPS"
          else
            echo "Max reps: unlimited"
          fi

          if [ "$RANDOM" = "true" ]; then
            echo "Mode: RANDOM SAMPLING"
            ARGS="$ARGS --random"
          else
            echo "Mode: SEQUENTIAL SCAN"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "Mode: DRY RUN"
            ARGS="$ARGS --dry-run"
          else
            echo "Mode: LIVE"
          fi

          node scripts/paparazzi-scraper.js $ARGS

      - name: Skip - scan already complete
        if: steps.check_complete.outputs.scan_complete == 'true'
        run: |
          echo "=========================================="
          echo "SCAN COMPLETE - All IDs have been checked"
          echo "=========================================="
          echo ""
          echo "The Paparazzi scraper has finished scanning all 900,000 possible IDs."
          echo "Consider disabling this workflow to save CI minutes."
          echo ""
          echo "To disable: Go to Actions > Paparazzi Accessories Scraper > ... > Disable workflow"

      - name: Show final stats
        if: always()
        run: |
          echo "Final stats:"
          node scripts/paparazzi-scraper.js --stats || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
