# THREE International URL Discovery Workflow
#
# Discovers THREE International representative subdomains from multiple sources.
# Uses Common Crawl, Wayback Machine, and SerpAPI to find subdomain URLs.
#
# URL Pattern: {subdomain}.threeinternational.com
# Firestore Collection: three_discovered_subdomains
#
# Schedule: Every 6 hours (4x daily)

name: THREE URL Discovery

on:
  schedule:
    # Run every 6 hours: 6am, 12pm, 6pm, 12am PT
    - cron: '0 14,20,2,8 * * *'

  workflow_dispatch:
    inputs:
      max_searches:
        description: 'Maximum SerpAPI searches per run (0 = unlimited)'
        required: false
        default: '0'
        type: string
      dry_run:
        description: 'Dry run (preview only, no Firestore writes)'
        required: false
        default: false
        type: boolean
      reset_state:
        description: 'Reset discovery state before running'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies
        run: |
          cd scripts && npm ci && cd ..
          echo "Dependencies installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Setup SerpAPI credentials
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: |
          mkdir -p secrets
          echo "$SERPAPI_KEY" > secrets/SerpAPI-Key
          echo "SerpAPI credentials configured"

      - name: Reset state (if requested)
        if: ${{ github.event.inputs.reset_state == 'true' }}
        run: |
          echo "Resetting discovery state..."
          node scripts/three-url-discovery.js --reset
          echo "State reset complete"

      - name: Run THREE URL Discovery
        env:
          MAX_SEARCHES: ${{ github.event.inputs.max_searches || '0' }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
        run: |
          echo "Starting THREE International URL Discovery..."

          ARGS="--discover"

          # 0 = unlimited (no --max flag)
          if [ "$MAX_SEARCHES" != "0" ]; then
            echo "Max SerpAPI searches: $MAX_SEARCHES"
            ARGS="$ARGS --max=$MAX_SEARCHES"
          else
            echo "Max SerpAPI searches: unlimited"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "Mode: DRY RUN"
            ARGS="$ARGS --dry-run"
          else
            echo "Mode: LIVE"
          fi

          node scripts/three-url-discovery.js $ARGS

      - name: Show stats
        if: always()
        run: |
          echo "Final stats:"
          node scripts/three-url-discovery.js --stats || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
