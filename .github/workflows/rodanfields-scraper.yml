name: Rodan + Fields Contact Scraper

on:
  schedule:
    # Run hourly at :30 to stagger from discovery workflow
    - cron: '30 * * * *'

  # Allow manual trigger for testing
  workflow_dispatch:
    inputs:
      max_profiles:
        description: 'Maximum profiles to scrape per run'
        required: false
        default: '50'
        type: string
      test_cid:
        description: 'Test single consultant by CID'
        required: false
        type: string

env:
  NODE_VERSION: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install dependencies
        run: |
          cd scripts && npm ci && cd ..
          echo "Dependencies installed"

      - name: Install Playwright Firefox
        run: |
          cd scripts
          npx playwright install firefox
          npx playwright install-deps firefox
          cd ..
          echo "Playwright Firefox installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Show pre-run stats
        run: |
          echo "Pre-run stats:"
          node scripts/rodanfields-scraper.js --stats || true

      - name: Test single consultant (if CID provided)
        if: ${{ github.event.inputs.test_cid != '' }}
        env:
          TEST_CID: ${{ github.event.inputs.test_cid }}
        run: |
          echo "Testing single consultant: $TEST_CID"
          node scripts/rodanfields-scraper.js --test --cid=$TEST_CID

      - name: Run R+F Contact Scraper
        if: ${{ github.event.inputs.test_cid == '' }}
        env:
          MAX_PROFILES: ${{ github.event.inputs.max_profiles || '50' }}
        run: |
          echo "Starting Rodan + Fields Contact Scraper..."
          echo "Max profiles per run: $MAX_PROFILES"

          node scripts/rodanfields-scraper.js --scrape --max=$MAX_PROFILES

      - name: Show final stats
        if: always()
        run: |
          echo "Final stats:"
          node scripts/rodanfields-scraper.js --stats || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
