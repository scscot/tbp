name: Scentsy Consultant Scraper

on:
  schedule:
    # Run 4x daily (every 6 hours)
    - cron: '0 6,12,18,0 * * *'

  workflow_dispatch:
    inputs:
      max_zipcodes:
        description: 'Max postal codes to process per run'
        required: false
        default: '20'
        type: string
      country:
        description: 'Country filter (US, CA, GB, DE, NL, AU)'
        required: false
        type: string
      dry_run:
        description: 'Dry run (preview only, no Firestore writes)'
        required: false
        default: false
        type: boolean
      reset:
        description: 'Reset all scraped flags before running'
        required: false
        default: false
        type: boolean

env:
  NODE_VERSION: '20'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'scripts/package.json'

      - name: Install Puppeteer dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libnss3 \
            libatk-bridge2.0-0 \
            libdrm2 \
            libxkbcommon0 \
            libxcomposite1 \
            libxdamage1 \
            libxrandr2 \
            libgbm1 \
            libasound2 \
            libpangocairo-1.0-0 \
            libgtk-3-0
          echo "Puppeteer dependencies installed"

      - name: Install npm dependencies
        run: |
          cd scripts && npm ci && cd ..
          echo "Dependencies installed"

      - name: Setup Firebase credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          mkdir -p secrets
          echo "$FIREBASE_SERVICE_ACCOUNT" > secrets/serviceAccountKey.json
          echo "Firebase credentials configured"

      - name: Reset scraped flags (if requested)
        if: ${{ github.event.inputs.reset == 'true' }}
        run: |
          echo "Resetting all scraped flags..."
          node scripts/scentsy-scraper.js --reset
          echo "Reset complete"

      - name: Show initial stats
        run: |
          echo "Current collection stats:"
          node scripts/scentsy-scraper.js --stats

      - name: Run Scentsy scraper
        env:
          MAX_ZIPCODES: ${{ github.event.inputs.max_zipcodes || '20' }}
          COUNTRY: ${{ github.event.inputs.country }}
          DRY_RUN: ${{ github.event.inputs.dry_run }}
          HEADLESS: 'true'
        run: |
          echo "Starting Scentsy Consultant Scraper..."
          echo "Max zipcodes: $MAX_ZIPCODES"

          ARGS="--scrape --max=$MAX_ZIPCODES"

          if [ -n "$COUNTRY" ]; then
            echo "Country filter: $COUNTRY"
            ARGS="$ARGS --country=$COUNTRY"
          fi

          if [ "$DRY_RUN" = "true" ]; then
            echo "Mode: DRY RUN"
            ARGS="$ARGS --dry-run"
          else
            echo "Mode: LIVE"
          fi

          node scripts/scentsy-scraper.js $ARGS

      - name: Show final stats
        if: always()
        run: |
          echo "Final stats:"
          node scripts/scentsy-scraper.js --stats || true

      - name: Cleanup
        if: always()
        run: |
          rm -rf secrets/
          echo "Cleanup complete"
